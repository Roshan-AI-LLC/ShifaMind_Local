# benchmark/config.yaml
# ──────────────────────────────────────────────────────────────────────────────
# Single source of truth for the ShifaMind benchmark.
# train_all.py / evaluate_all.py / llm_eval.py / generate_table.py all read
# from here — nothing is hardcoded in those scripts.
#
# Paths are relative to the ShifaMind_Local project root unless noted.
# ──────────────────────────────────────────────────────────────────────────────

# ── Reproducibility ───────────────────────────────────────────────────────────
seed: 42

# ── Data (produced by Phase 1 preprocessing — never regenerated here) ─────────
data:
  train_split:         shifamind_local/shared_data/train_split.pkl
  val_split:           shifamind_local/shared_data/val_split.pkl
  test_split:          shifamind_local/shared_data/test_split.pkl
  train_concept_labels: shifamind_local/shared_data/train_concept_labels.npy
  val_concept_labels:   shifamind_local/shared_data/val_concept_labels.npy
  test_concept_labels:  shifamind_local/shared_data/test_concept_labels.npy
  concept_list:        shifamind_local/shared_data/concept_list.json
  top50_info:          shifamind_local/shared_data/top50_icd10_info.json

# ── Checkpoints ───────────────────────────────────────────────────────────────
checkpoints:
  baselines_dir:   benchmark/checkpoints
  # ShifaMind Phase 1 best checkpoint (already trained — just evaluated)
  shifamind_p1:    shifamind_local/checkpoints/phase1
  shifamind_p2:    shifamind_local/checkpoints/phase2
  shifamind_p3:    shifamind_local/checkpoints/phase3_from_p2

# ── Results ───────────────────────────────────────────────────────────────────
results:
  output_dir:  benchmark/results
  llm_cache:   benchmark/results/llm_cache.json
  combined:    benchmark/results/all_results.json
  table_tex:   benchmark/results/comparison_table.tex
  table_csv:   benchmark/results/comparison_table.csv

# ── Device ────────────────────────────────────────────────────────────────────
device: auto   # "auto" → MPS if available, else CUDA, else CPU

# ── Common training settings (applied to all Group A baselines) ───────────────
training:
  max_length:        512    # token limit for all BERT-based models
  train_batch_size:  8
  val_batch_size:    16
  grad_accum_steps:  4      # effective batch = 32
  max_grad_norm:     1.0
  num_workers:       0      # MPS requires 0
  # Per-label threshold sweep (matches ShifaMind protocol exactly)
  threshold_candidates: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40,
                         0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80,
                         0.85, 0.90, 0.95]

# ── Bootstrap CI settings (NeurIPS rigor) ─────────────────────────────────────
bootstrap:
  n_samples:   1000
  ci_level:    0.95

# ──────────────────────────────────────────────────────────────────────────────
# GROUP A — Trainable baselines
# Each entry: name, model_class, hyperparams
# ──────────────────────────────────────────────────────────────────────────────
group_a:

  caml:
    display_name: "CAML"
    table_group:  "CNN/Attention Baselines"
    model_class:  "CAML"
    # Original: word2vec 100-dim, conv filter 4, 500 hidden.
    # Here: learned embeddings over BERT WordPiece vocab (same tokenizer as
    # ShifaMind so text preprocessing is identical).
    embed_dim:    100
    num_filters:  500
    filter_size:  4
    dropout:      0.3
    lr:           1e-3
    epochs:       20
    weight_decay: 1e-5
    # Long-document strategy: chunk into 512-token windows, max-pool logits
    chunk_size:   512
    chunk_overlap: 64
    interpretable: "Attention only"
    hipaa_safe:    true

  laat:
    display_name: "LAAT"
    table_group:  "CNN/Attention Baselines"
    model_class:  "LAAT"
    embed_dim:    100
    hidden_dim:   512    # BiGRU hidden (each direction)
    label_embed_dim: 256
    dropout:      0.3
    lr:           5e-4
    epochs:       20
    weight_decay: 1e-5
    chunk_size:   512
    chunk_overlap: 64
    interpretable: "Attention only"
    hipaa_safe:    true

  plm_icd:
    display_name: "PLM-ICD"
    table_group:  "Transformer Baselines"
    model_class:  "PLMICD"
    bert_model:   "emilyalsentzer/Bio_ClinicalBERT"
    hidden_size:  768
    dropout:      0.1
    lr_bert:      2e-5
    lr_head:      1e-3
    epochs:       12
    freeze_bert_epochs: 0
    interpretable: "×"
    hipaa_safe:    true

  msmn:
    display_name: "MSMN"
    table_group:  "Transformer Baselines"
    model_class:  "MSMN"
    bert_model:   "emilyalsentzer/Bio_ClinicalBERT"
    hidden_size:  768
    num_synonyms: 4      # synonyms per ICD code (from top50_info name + desc)
    dropout:      0.1
    lr_bert:      2e-5
    lr_head:      1e-3
    epochs:       12
    freeze_bert_epochs: 2
    interpretable: "✓Partial"
    hipaa_safe:    true

  vanilla_cbm:
    display_name: "Vanilla CBM"
    table_group:  "Ontology/Concept Baselines"
    model_class:  "VanillaCBM"
    bert_model:   "emilyalsentzer/Bio_ClinicalBERT"
    hidden_size:  768
    num_concepts: 111   # matches ShifaMind concept space
    dropout:      0.1
    # Two-stage training:
    #   Stage 1 — fine-tune BERT + concept head (concept supervision)
    #   Stage 2 — freeze BERT+concept, train linear dx head only
    lr_stage1:    2e-5
    lr_stage2:    1e-3
    epochs_stage1: 6
    epochs_stage2: 6
    interpretable: "✓Full"
    hipaa_safe:    true

# ──────────────────────────────────────────────────────────────────────────────
# GROUP B — Frontier LLMs (zero-shot, 500-sample stratified subset)
# Update model names to whatever is current at time of running.
# ──────────────────────────────────────────────────────────────────────────────
llm_eval:
  n_samples:   500
  seed:        42
  max_tokens:  150      # output tokens (JSON list only)
  # Max input characters sent to LLM (≈2000 tokens for most tokenisers)
  max_input_chars: 8000
  max_retries: 3
  retry_delay_s: 2.0

  models:
    gpt:
      display_name: "GPT (frontier)"
      # Update this to the latest available model at run time.
      # Was GPT-4o as of Aug 2025; check OpenAI for current name.
      model_id:    "gpt-4o"
      provider:    "openai"
      # Price per 1M tokens (update at run time from platform.openai.com/pricing)
      cost_per_1m_input:  5.00
      cost_per_1m_output: 15.00
      table_group: "Frontier LLMs"
      interpretable: "×"
      hipaa_safe:    false

    claude:
      display_name: "Claude Sonnet 3.7"
      model_id:    "claude-sonnet-3-7-20250219"
      provider:    "anthropic"
      cost_per_1m_input:  3.00
      cost_per_1m_output: 15.00
      table_group: "Frontier LLMs"
      interpretable: "×"
      hipaa_safe:    false

    gemini:
      display_name: "Gemini 2.5 Pro"
      # Update to current model ID at run time
      model_id:    "gemini-2.5-pro-preview-03-25"
      provider:    "google"
      cost_per_1m_input:  7.00
      cost_per_1m_output: 21.00
      table_group: "Frontier LLMs"
      interpretable: "×"
      hipaa_safe:    false

# ── ShifaMind (Ours) — loaded from existing checkpoints, not retrained ─────────
shifamind:
  phases:
    phase1:
      display_name: "ShifaMind Phase 1 (CBM)"
      table_group:  "Ontology/Concept Baselines"
      interpretable: "✓Full"
      hipaa_safe:    true
    phase2:
      display_name: "ShifaMind Phase 2 (+GAT)"
      table_group:  "Ontology/Concept Baselines"
      interpretable: "✓Full"
      hipaa_safe:    true
    phase3:
      display_name: "ShifaMind Phase 3 (+RAG)"
      table_group:  "Ontology/Concept Baselines"
      interpretable: "✓Full"
      hipaa_safe:    true
